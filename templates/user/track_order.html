<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking</title>
  <style>
    body{margin:0;font-family:Segoe UI,sans-serif;background:#f2f7ff;color:#153355}
    header{background:linear-gradient(135deg,#0f4ebf,#2d82f4);color:#fff;padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
    header a{color:#fff;text-decoration:none;background:rgba(255,255,255,.14);padding:7px 10px;border-radius:8px}
    .wrap{max-width:980px;margin:18px auto;padding:0 12px;display:grid;gap:12px}
    .card{background:#fff;border-radius:14px;box-shadow:0 12px 26px rgba(12,36,70,.12);padding:14px}
    .flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
    .step{border-radius:10px;padding:10px;border:1px solid #d9e4fa;background:#f7faff;font-size:13px}
    .step.active{background:#e7f0ff;border-color:#3276e4;font-weight:700}
    .step.done{background:#e8f8ef;border-color:#1c9a61}
    #mapBox{height:280px;border-radius:10px;overflow:hidden;background:#eef3ff;display:grid;place-items:center;color:#547299}
    input{width:100%;padding:9px;border:1px solid #c7d7f6;border-radius:8px;margin-bottom:8px}
    button{border:0;border-radius:8px;padding:9px 12px;background:#1f66dd;color:#fff;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <div><b>Track Order</b></div>
    <div>
      <a href="/user/home">User Home</a>
      <a href="/role/logout">Logout</a>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <input id="orderIdInput" placeholder="Enter Order ID" value="{{ order_id or '' }}">
      <button onclick="loadTracking()">Track Order</button>
    </section>

    <section class="card">
      <h3 id="orderMeta">Order Status</h3>
      <div class="flow" id="flow"></div>
      <p id="agentInfo"></p>
      <p id="etaInfo"></p>
    </section>

    <section class="card">
      <h3>Live Delivery Location</h3>
      <div id="mapBox">Waiting for location updates...</div>
      <p id="coordInfo"></p>
    </section>
  </main>

  <script src="/static/js/order_tracking.js"></script>
</body>
</html>
