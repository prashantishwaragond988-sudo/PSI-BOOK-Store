<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:#eef3fb;
      color:#1f2937;
    }
    :root{
      --lift: 5px;
      --lift-shadow: rgba(11,29,76,.28);
    }
    .menu-bar{
      background:#0f4aa8;
      color:white;
      padding:12px 16px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .menu-title{
      font-size:18px;
      font-weight:700;
    }
    .menu-links{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .menu-links a{
      color:white;
      text-decoration:none;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.24);
      padding:8px 12px;
      border-radius:8px;
      font-size:13px;
    }
    .menu-links a,
    .actions a{
      transform:translateY(0);
      box-shadow:0 var(--lift) 0 var(--lift-shadow);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }
    .menu-links a:hover,
    .actions a:hover{
      transform:translateY(-2px);
      box-shadow:0 calc(var(--lift) + 2px) 0 var(--lift-shadow);
      filter:brightness(1.04);
    }
    .menu-links a:active,
    .actions a:active{
      transform:translateY(2px);
      box-shadow:0 2px 0 var(--lift-shadow);
    }
    .wrap{
      max-width:780px;
      margin:18px auto;
      padding:0 12px;
    }
    .card{
      background:white;
      border-radius:14px;
      box-shadow:0 10px 26px rgba(0,0,0,.08);
      padding:18px;
    }
    h2{
      margin:0 0 10px;
      font-size:24px;
    }
    .line{
      border-top:1px solid #e4eaf2;
      margin:12px 0;
    }
    .row{
      margin:8px 0;
      font-size:15px;
    }
    .label{
      color:#6b7280;
      margin-right:6px;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .actions a{
      text-decoration:none;
      padding:9px 12px;
      border-radius:8px;
      font-size:14px;
      font-weight:600;
      border:1px solid #d4ddec;
      background:#f7f9fe;
      color:#1f2937;
    }
  </style>
</head>
<body>
  <div class="menu-bar">
    <div class="menu-title">My Profile</div>
    <div class="menu-links">
      <a href="/store">Store Home</a>
      <a href="/wishlist">Wishlist</a>
      <a href="/checkout">Checkout</a>
      <a href="/orders">My Orders</a>
      <a href="/admin">Admin</a>
      <a href="/logout">Logout</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>Account Details</h2>
      <div class="row"><span class="label">Email:</span>{{ session["user"] }}</div>
      <div class="row"><span class="label">Role:</span>{{ role_label }}</div>
      <div class="row"><span class="label">Status:</span>Verified</div>

      <div class="line"></div>
      <div class="actions">
        <a href="/orders">View Orders</a>
        <a href="/store">Continue Shopping</a>
        <a href="/wishlist">Open Wishlist</a>
      </div>
    </div>
  </div>
</body>
</html>
