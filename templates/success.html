<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:#eef3fb;
      color:#1f2937;
    }
    :root{
      --lift: 5px;
      --lift-shadow: rgba(11,29,76,.28);
    }
    .menu-bar{
      background:#0f4aa8;
      color:white;
      padding:12px 16px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .menu-title{
      font-size:18px;
      font-weight:700;
    }
    .menu-links{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .menu-links a{
      color:white;
      text-decoration:none;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.24);
      padding:8px 12px;
      border-radius:8px;
      font-size:13px;
    }
    .menu-links a,
    .actions a{
      transform:translateY(0);
      box-shadow:0 var(--lift) 0 var(--lift-shadow);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }
    .menu-links a:hover,
    .actions a:hover{
      transform:translateY(-2px);
      box-shadow:0 calc(var(--lift) + 2px) 0 var(--lift-shadow);
      filter:brightness(1.04);
    }
    .menu-links a:active,
    .actions a:active{
      transform:translateY(2px);
      box-shadow:0 2px 0 var(--lift-shadow);
    }
    .wrap{
      min-height:calc(100vh - 70px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .box{
      background:white;
      border-radius:16px;
      box-shadow:0 12px 28px rgba(0,0,0,.1);
      width:min(480px,100%);
      text-align:center;
      padding:26px;
    }
    h2{
      margin:0 0 8px;
      color:#166534;
    }
    .id{
      color:#0f4aa8;
      font-weight:700;
      margin:8px 0 18px;
      word-break:break-word;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
    }
    .actions a{
      text-decoration:none;
      border-radius:8px;
      padding:9px 12px;
      font-size:14px;
      font-weight:600;
    }
    .blue{background:#1d4ed8;color:white}
    .gray{background:#eef2f7;color:#1f2937}
  </style>
</head>
<body>
  <div class="menu-bar">
    <div class="menu-title">Order Complete</div>
    <div class="menu-links">
      <a href="/store">Store Home</a>
      <a href="/orders">My Orders</a>
      <a href="/profile">Profile</a>
      <a href="/logout">Logout</a>
    </div>
  </div>

  <div class="wrap">
    <div class="box">
      <h2>Order Placed Successfully</h2>
      <div>Your order has been submitted to the store owner.</div>
      <div class="id">Order ID: {{ order_id }}</div>
      <div class="actions">
        <a class="blue" href="/orders">View My Orders</a>
        <a class="gray" href="/store">Continue Shopping</a>
      </div>
    </div>
  </div>
</body>
</html>
