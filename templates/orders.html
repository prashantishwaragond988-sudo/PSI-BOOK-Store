<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:#eef3fb;
      color:#1f2937;
    }
    :root{
      --lift: 5px;
      --lift-shadow: rgba(11,29,76,.28);
    }
    .menu-bar{
      background:#0f4aa8;
      color:white;
      padding:12px 16px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .menu-title{
      font-size:18px;
      font-weight:700;
    }
    .menu-links{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .menu-links a{
      color:white;
      text-decoration:none;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.24);
      padding:8px 12px;
      border-radius:8px;
      font-size:13px;
    }
    .menu-links a{
      transform:translateY(0);
      box-shadow:0 var(--lift) 0 var(--lift-shadow);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }
    .menu-links a:hover{
      transform:translateY(-2px);
      box-shadow:0 calc(var(--lift) + 2px) 0 var(--lift-shadow);
      filter:brightness(1.04);
    }
    .menu-links a:active{
      transform:translateY(2px);
      box-shadow:0 2px 0 var(--lift-shadow);
    }
    .wrap{
      max-width:980px;
      margin:18px auto;
      padding:0 12px;
    }
    h2{
      margin:0 0 10px;
      font-size:24px;
    }
    .order{
      background:white;
      border-radius:14px;
      box-shadow:0 10px 26px rgba(0,0,0,.08);
      padding:14px;
      margin-bottom:12px;
    }
    .top{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:space-between;
      margin-bottom:8px;
    }
    .id{
      font-weight:700;
      color:#0f4aa8;
      word-break:break-word;
    }
    .pill{
      font-size:12px;
      border-radius:999px;
      padding:6px 10px;
      border:1px solid #d9e2f0;
      background:#f7f9fe;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px 14px;
      font-size:14px;
    }
    .label{
      color:#6b7280;
      margin-right:4px;
    }
    .books{
      margin-top:8px;
      font-size:13px;
      color:#384152;
    }
    .empty{
      background:white;
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
      padding:18px;
      color:#6b7280;
    }
    @media (max-width:760px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="menu-bar">
    <div class="menu-title">My Orders</div>
    <div class="menu-links">
      <a href="/store">Store Home</a>
      <a href="/wishlist">Wishlist</a>
      <a href="/checkout">Checkout</a>
      <a href="/profile">Profile</a>
      <a href="/logout">Logout</a>
    </div>
  </div>

  <div class="wrap">
    <h2>Order History</h2>
    <div id="ordersBox" class="empty">Please wait, fetching orders...</div>
  </div>

  <script>
    function escapeHtml(v){
      return (v || "").toString().replace(/[&<>"']/g, function(ch){
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
      });
    }

    function addressText(address){
      if(!address || typeof address !== "object"){
        return "-";
      }
      const parts = [
        address.fullname || "",
        address.street || "",
        address.city || "",
        address.pincode || "",
        address.mobile || ""
      ].map((x) => (x || "").toString().trim()).filter(Boolean);
      return parts.length ? parts.join(", ") : "-";
    }

    function orderCard(o){
      const storeName = o.store_name || o.store_id || "-";
      const booksText = o.books_text || (Array.isArray(o.items) ? o.items.map((it) => (it.book || "-") + " x" + (it.qty || 0)).join(", ") : "-");
      return (
        "<div class='order'>" +
          "<div class='top'>" +
            "<div class='id'>Order: " + escapeHtml(o.id || "-") + "</div>" +
            "<div class='pill'>" + escapeHtml(o.time || "-") + "</div>" +
          "</div>" +
          "<div class='grid'>" +
            "<div><span class='label'>Store:</span>" + escapeHtml(storeName) + "</div>" +
            "<div><span class='label'>Total:</span>Rs " + escapeHtml(String(o.total || 0)) + "</div>" +
            "<div><span class='label'>Payment:</span>" + escapeHtml(o.payment_method || "COD") + "</div>" +
            "<div><span class='label'>Status:</span>" + escapeHtml(o.payment_status || "-") + "</div>" +
            "<div><span class='label'>Txn:</span>" + escapeHtml(o.transaction_id || "-") + "</div>" +
            "<div><span class='label'>Address:</span>" + escapeHtml(addressText(o.address)) + "</div>" +
          "</div>" +
          "<div class='books'><span class='label'>Books:</span>" + escapeHtml(booksText) + "</div>" +
        "</div>"
      );
    }

    fetch("/api/orders")
      .then((r) => r.json())
      .then((data) => {
        const box = document.getElementById("ordersBox");
        if(!Array.isArray(data) || data.length === 0){
          box.className = "empty";
          box.innerHTML = "No orders yet.";
          return;
        }
        box.className = "";
        box.innerHTML = data.map(orderCard).join("");
      })
      .catch(() => {
        const box = document.getElementById("ordersBox");
        box.className = "empty";
        box.textContent = "Unable to load orders.";
      });
  </script>
</body>
</html>
