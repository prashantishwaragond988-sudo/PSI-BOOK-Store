<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-a:#e9f1ff;
      --bg-b:#f8fbff;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#e11d48;
      --accent-dark:#be123c;
      --lift:5px;
      --lift-shadow:rgba(73,15,28,.25);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:'Poppins',sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 10% 0%, #dbeafe 0%, rgba(219,234,254,0) 60%),
        radial-gradient(850px 500px at 90% 100%, #fee2e2 0%, rgba(254,226,226,0) 58%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      display:grid;
      place-items:center;
      padding:16px;
    }
    .card{
      width:min(560px, 100%);
      background:var(--card);
      border:1px solid #f5c2ce;
      border-radius:20px;
      box-shadow:0 20px 38px rgba(0,0,0,.11);
      padding:26px 22px;
      text-align:center;
      position:relative;
      overflow:hidden;
      animation:enter .45s ease-out both;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:7px;
      background:linear-gradient(90deg, var(--accent), #fb7185);
    }
    .lock-wrap{
      width:86px;
      height:86px;
      margin:10px auto 12px;
      border-radius:999px;
      background:#ffe4ea;
      border:2px solid #fecdd3;
      display:grid;
      place-items:center;
      animation:pulse 1.6s ease-in-out infinite;
    }
    .lock{
      font-size:40px;
      line-height:1;
      animation:shake 2.2s ease-in-out infinite;
      transform-origin:50% 70%;
      color:var(--accent-dark);
    }
    h1{
      margin:8px 0 4px;
      font-size:30px;
      line-height:1.2;
      color:#9f1239;
    }
    .target{
      display:inline-block;
      margin:4px 0 12px;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      background:#fff1f2;
      border:1px solid #fecdd3;
      color:#9f1239;
      font-weight:600;
    }
    p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }
    .actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .btn{
      text-decoration:none;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-family:inherit;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transform:translateY(0);
      box-shadow:0 var(--lift) 0 var(--lift-shadow);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }
    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 calc(var(--lift) + 2px) 0 var(--lift-shadow);
      filter:brightness(1.03);
    }
    .btn:active{
      transform:translateY(2px);
      box-shadow:0 2px 0 var(--lift-shadow);
    }
    .btn-primary{
      background:var(--accent);
      color:white;
    }
    .btn-secondary{
      background:#fff7f8;
      color:#9f1239;
      border:1px solid #fecdd3;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.08)}
    }
    @keyframes shake{
      0%,100%{transform:rotate(0deg)}
      8%{transform:rotate(8deg)}
      16%{transform:rotate(-8deg)}
      24%{transform:rotate(6deg)}
      32%{transform:rotate(-4deg)}
      40%{transform:rotate(0deg)}
    }
    @keyframes enter{
      from{opacity:0; transform:translateY(14px) scale(.98)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }
  </style>
</head>
<body>
  <section class="card" role="alert" aria-live="assertive">
    <div class="lock-wrap">
      <div class="lock">!</div>
    </div>
    <h1>Access Denied</h1>
    <div class="target">{{ target_page or 'Admin' }}</div>
    <p>Your account does not have permission to open this section.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/store">Back To Store</a>
      <a class="btn btn-secondary" href="/profile">My Profile</a>
    </div>
  </section>
</body>
</html>
