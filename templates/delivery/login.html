<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Login</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Segoe UI,Tahoma,sans-serif;
      background:linear-gradient(150deg,#dbeafe,#ecfeff);
      color:#0f2144;
    }
    .card{
      width:min(460px,92vw);
      background:#fff;
      border:1px solid #d8e5fb;
      border-radius:16px;
      box-shadow:0 14px 30px rgba(14,33,78,.16);
      padding:18px;
    }
    h1{margin:0 0 12px;font-size:24px}
    p{margin:0 0 12px;color:#5f7398}
    label{display:block;margin:10px 0 6px;font-weight:700}
    input{
      width:100%;
      border:1px solid #cbdcf9;
      border-radius:10px;
      padding:10px;
      font-size:14px;
    }
    button{
      margin-top:14px;
      width:100%;
      border:0;
      border-radius:10px;
      padding:11px;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg,#1f5fe0,#0e9db4);
      box-shadow:0 8px 0 rgba(16,44,112,.35);
    }
    button:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(16,44,112,.35)}
    .err{margin-top:10px;color:#c0392b;font-weight:700}
    .links{margin-top:10px;font-size:13px}
    .links a{color:#1f5fe0;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <h1>Delivery Agent Login</h1>
    <p>Login with delivery boy account and open assigned duty board.</p>

    <form method="post" action="/delivery/login">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ email or '' }}" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <button type="submit">Login</button>
    </form>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <div class="links">
      <a href="/login">Back to user login</a>
    </div>
  </main>
</body>
</html>
